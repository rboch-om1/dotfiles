# Enable mouse: wheel scrolls window output (enters copy mode), click to select pane
set -g mouse on

# Keep more scrollback history so long output isn't lost
set -g history-limit 50000

# vi-style copy mode
setw -g mode-keys vi

# Send every copy to the system clipboard via OSC 52 (reaches the Mac over SSH)
set -g set-clipboard on

# On mouse-drag release: copy the selection to clipboard but stay in copy mode
# (keeps your scroll position; press q to exit copy mode when done)
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-no-clear

# A plain single click (no drag) exits copy mode — keeps stray trackpad
# clicks from leaving you stuck in copy mode.
bind -T copy-mode-vi MouseUp1Pane send -X cancel

# --- Status bar: window list styled as clickable browser-style tabs ---
# (mouse on, above, makes each tab clickable to switch windows)
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=colour22,fg=colour255"

# Left: session name blended into the bar — black text on the green bar
set -g status-left "#[bg=colour22,fg=colour16,bold] #S #[bg=colour22] "
set -g status-left-length 30

# Inactive tabs: dim, padded so they read as separate tabs
setw -g window-status-format " #I: #W "
setw -g window-status-style "bg=colour238,fg=colour250"

# Active tab: warm amber highlight — pops against green without clashing
setw -g window-status-current-format " #I: #W "
setw -g window-status-current-style "bg=colour214,fg=colour16,bold"

# A gap between tabs so they don't run together
setw -g window-status-separator " "

# A window with activity gets a subtle marker
setw -g window-status-activity-style "bg=colour238,fg=colour214"

# Right: time, kept minimal
set -g status-right "#[fg=colour245] %H:%M "
set -g status-right-length 20
